<html lang="en">

    <link rel="stylesheet" href="style.css" />

  <body>
    <div class="header2">
        <a href="index.html"><img src="Image/logo.png" class="logo2"/></a>
      <h1>
        Découvre les nouvelles cartes exclusive en 3d sur ton navigateur !
      </h1>
    </div>
    <main>
      <model-viewer
        src="models/lord_jaraxxus_3d_card.glb"

        auto-rotate
        style="width: 80%; height: 500px; display: block; margin: auto;"

            <model-viewer
        src="models//hearthstone_card.glb"

        </p>
        <a href="https://playhearthstone.com" class="btn_footer"

        >
      </div>

    <script
      type="module"

    ></script>
